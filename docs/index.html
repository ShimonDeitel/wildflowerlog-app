<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wildflower Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background: rgb(23,15,28); color:#eee; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width: 560px; padding: 40px 24px; }
  h1 { font-size: 2.2rem; margin-bottom: 0.4em; }
  p { color: #bbb; line-height: 1.6; }
  a.btn { display:inline-block; margin-top: 24px; padding: 12px 28px; background: rgb(194,74,142); color:#111; border-radius: 999px; text-decoration:none; font-weight:600; }
  .links { margin-top: 40px; font-size: 0.85rem; }
  .links a { color: #999; margin: 0 10px; text-decoration:none; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4FB0AE55 0%, #4FB0AE00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Wildflower Log</h1>
  <p>Keep a record of wildflowers spotted on every walk.</p>
  <p>Log flower name, location, and bloom date. Upgrade for bloom-season reminders year over year and photo notes.</p>
  <a class="btn" href="#">Get it on the App Store</a>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Use</a>
  </div>
</div>
</body>
</html>
