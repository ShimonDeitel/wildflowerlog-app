name: WildflowerLog
options:
  bundleIdPrefix: com.shimondeitel.wildflowerlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  WildflowerLog:
    type: application
    platform: iOS
    sources:
      - path: WildflowerLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wildflowerlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WildflowerLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WildflowerLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WildflowerLogTests
      - path: WildflowerLog.storekit
    dependencies:
      - target: WildflowerLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wildflowerlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WildflowerLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WildflowerLogUITests
    dependencies:
      - target: WildflowerLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wildflowerlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WildflowerLog:
    build:
      targets:
        WildflowerLog: all
        WildflowerLogTests: [test]
        WildflowerLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: WildflowerLog.storekit
    test:
      config: Debug
      storeKitConfiguration: WildflowerLog.storekit
      targets:
        - WildflowerLogTests
        - WildflowerLogUITests
    archive:
      config: Release
